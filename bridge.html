<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>bridge</title></head><body>
<script>
(async function(){
  const files = [
    'day-01-carousel-01-cover.png','day-01-carousel-02-develop.png','day-01-carousel-03-nourish-them.png',
    'day-01-carousel-04-nourish-you.png','day-01-carousel-05-private.png',
    'day-03-privacy-proof.png','day-04-hot-afternoon-activities.png',
    'food-01-lentil-veg.jpg','food-02-strawberry.jpg'
  ];
  const target = window.opener;
  if (!target) { document.title = 'no-opener'; document.body.textContent = 'no opener'; return; }
  for (const f of files) {
    try {
      const buf = await fetch('/assets/campaign/' + f).then(r => r.arrayBuffer());
      target.postMessage({bridge: true, name: f, buf: buf}, '*');
      document.body.textContent = 'sent ' + f;
    } catch (e) { target.postMessage({bridge: true, name: f, error: String(e)}, '*'); }
  }
  target.postMessage({bridge: true, done: true}, '*');
  document.title = 'done';
  document.body.textContent = 'all sent, you can close this tab';
})();
</script>
</body></html>
