<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#fbe7ec" />
<title>Opening Chloe's World</title>
<script>
(function(){
  var base = "https://msallamissa-star.github.io/Our-World/";
  var path = (window.location.pathname || "").replace(/^\/+|\/+$/g, "");
  var hash = window.location.hash || "";
  var route = "";
  if(hash.indexOf("#/") === 0){
    route = hash;
  } else if(path){
    route = "#/" + path.split("/").pop();
  }
  var known = { home:1, meals:1, grownmeals:1, game:1, done:1, grownups:1 };
  if(route && known[route.replace(/^#\//, "")]){
    window.location.replace(base + route);
  } else {
    window.location.replace(base);
  }
})();
</script>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:#fbe7ec;
    color:#4a3a48;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  main{ text-align:center; padding:32px; }
  a{ color:#b75d83; font-weight:700; }
</style>
</head>
<body>
<main>
  <h1>Opening Chloe's World</h1>
  <p><a href="https://msallamissa-star.github.io/Our-World/">Tap here if it does not open automatically.</a></p>
</main>
</body>
</html>
